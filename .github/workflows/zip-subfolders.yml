name: Zip Subfolders

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  zip-subfolders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip each subfolder
        run: |
          mkdir -p dist/epicgameguy
          for dir in */; do
            dir="${dir%/}"
            if [ "$dir" = "dist" ]; then
              continue
            fi
            cp -r "$dir" "dist/epicgameguy/$dir"
            pushd dist
            echo "Zipping $dir..."
            zip -r "${dir}.zip" "epicgameguy/"
            rm -rf "epicgameguy/$dir"
            popd
          done

      - name: Upload zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zipped-subfolders
          path: dist/*.zip
          if-no-files-found: warn

      - name: Upload zips to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for zip in dist/*.zip; do
            gh release upload "${{ github.event.release.tag_name }}" "$zip"
          done
